name: EduLense

# Define when the workflow should run
on:
  push:
    # Trigger the workflow when pushing to these branches
    branches: 
      - "developer"
      - "dev/eduLense/milestone3"
    # Only run the workflow when changes are made in this specific folder
    paths:
      - "team_a/teamA/**"

  pull_request:
    # Trigger the workflow when a pull request is opened or updated for these branches
    branches: 
      - "developer"
      - "dev/eduLense/milestone3"
    # Only run the workflow when changes are made in this specific folder
    paths:
      - "team_a/teamA/**"

jobs:
  build:
    # Define the environment the job will run on (Ubuntu latest version)
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository to the runner machine
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Dart environment for running the tests and analysis
      - name: Setup Dart Environment
        uses: dart-lang/setup-dart@v1

      # Install project dependencies using Dart package manager
      - name: Install Dependencies
        run: dart pub get

      # Analyze the Dart project to check for any issues in the code
      # Restricts analysis only to files inside 'team_a/teamA'
      - name: Analyze Project Source
        run: dart analyze team_a/teamA

      # Run unit tests in the 'team_a/teamA' folder
      - name: Run Tests
        run: dart test team_a/teamA
